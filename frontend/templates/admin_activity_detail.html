{% extends "base.html" %}
{% block title %}รายละเอียดกิจกรรม - DSNPRU_REG{% endblock %}
{% block head_extra %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('activityDetailPage', () => ({
            activityId: "{{ activity_id }}",
            registrations: [],
            async load() {
                const token = sessionStorage.getItem('adminToken');
                if (!token) { window.location.href = '/admin/login'; return; }
                const res = await axios.get(`/admin/registrations/${this.activityId}`, {
                    headers: { Authorization: 'Bearer ' + token }
                });
                this.registrations = res.data;
                this.$nextTick(() => {
                    if ($.fn.DataTable.isDataTable('#regTable')) {
                        $('#regTable').DataTable().destroy();
                    }
                    setTimeout(() => {
                        const table = $('#regTable').DataTable({
                            language: {
                                search: "ค้นหา:",
                                lengthMenu: "แสดง _MENU_ รายการ",
                                info: "แสดง _START_ ถึง _END_ จากทั้งหมด _TOTAL_ รายการ",
                                paginate: {
                                    first: "หน้าแรก",
                                    last: "หน้าสุดท้าย",
                                    next: "ถัดไป",
                                    previous: "ก่อนหน้า"
                                },
                                zeroRecords: "ไม่พบข้อมูล"
                            }
                        });
                    }, 50);
                });
            },
            async exportExcel() {
                const token = sessionStorage.getItem('adminToken');
                const url = `/export/excel?activity_id=${this.activityId}`;
                const res = await axios.get(url, {
                    headers: { Authorization: 'Bearer ' + token },
                    responseType: 'blob'
                });
                saveAs(res.data, 'registrations.xlsx');
            },
            async exportPdf() {
                const token = sessionStorage.getItem('adminToken');
                const url = `/export/pdf?activity_id=${this.activityId}`;
                const res = await axios.get(url, {
                    headers: { Authorization: 'Bearer ' + token },
                    responseType: 'blob'
                });
                const blobUrl = URL.createObjectURL(res.data);
                window.open(blobUrl, '_blank');
            },
            async deleteRegistration(id) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบ?',
                    text: "คุณต้องการนำนักเรียนคนนี้ออกจากกิจกรรมใช่หรือไม่?",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#D95D39',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/registrations/${id}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.load();
                    Swal.fire('สำเร็จ', 'ลบการลงทะเบียนเรียบร้อยแล้ว', 'success');
                } catch (e) {
                    Swal.fire('ผิดพลาด', e.response?.data?.detail || 'ไม่สามารถลบได้', 'error');
                }
            }
        }));
    });
</script>
{% endblock %}
{% block content %}
<section x-data="activityDetailPage()" x-init="load()">
    <header class="mb-lg" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
        <h1 style="margin: 0;">รายชื่อผู้สมัครกิจกรรม</h1>
        <a href="/admin/activities" style="color: var(--color-danger); font-size: 0.875rem; font-weight: 700; text-decoration: none;">กลับหน้าจัดการกิจกรรม</a>
    </header>

    <div style="display: flex; justify-content: flex-end; gap: var(--space-sm); margin-bottom: var(--space-md);">
        <button class="btn btn--outline" @click="exportExcel" style="padding: 6px 12px; font-size: 0.75rem; border-radius: 999px;">
            ส่งออก Excel
        </button>
        <button class="btn btn--primary" @click="exportPdf" style="padding: 6px 12px; font-size: 0.75rem; border-radius: 999px;">
            ส่งออก PDF
        </button>
    </div>

    <div class="card" style="padding: var(--space-md); overflow-x: auto;">
        <table id="regTable" class="display" style="width: 100%; font-size: 0.875rem;">
            <thead>
                <tr>
                    <th style="text-align: left; padding: var(--space-sm);">ชื่อ–สกุล</th>
                    <th style="text-align: left; padding: var(--space-sm);">ห้อง</th>
                    <th style="text-align: left; padding: var(--space-sm);">เลขที่</th>
                    <th style="text-align: left; padding: var(--space-sm);">เวลา</th>
                    <th style="text-align: left; padding: var(--space-sm);">สถานะ</th>
                    <th style="text-align: right; padding: var(--space-sm);">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="r in registrations" :key="r.id">
                    <tr style="border-bottom: 1px solid var(--color-border);">
                        <td style="padding: var(--space-sm);" x-text="r.student.name"></td>
                        <td style="padding: var(--space-sm);" x-text="r.student.classroom"></td>
                        <td style="padding: var(--space-sm);" x-text="r.student.number"></td>
                        <td style="padding: var(--space-sm);" x-text="new Date(r.timestamp).toLocaleString('th-TH')"></td>
                        <td style="padding: var(--space-sm);">
                            <span x-show="r.status === 'registered'" class="badge badge--success" style="font-size: 0.65rem;">ลงทะเบียนสำเร็จ</span>
                            <span x-show="r.status === 'waitlisted'" class="badge badge--warning" style="font-size: 0.65rem;">สำรองคิว</span>
                        </td>
                        <td style="text-align: right; padding: var(--space-sm);">
                            <button @click="deleteRegistration(r.id)" class="btn" style="background: transparent; color: var(--color-danger); padding: 4px; border: none; box-shadow: none;">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
