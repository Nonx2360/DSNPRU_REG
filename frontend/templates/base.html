<!DOCTYPE html>
<html lang="th" x-data="{ dark: localStorage.getItem('theme') === 'dark' }"
    x-init="$watch('dark', v => localStorage.setItem('theme', v ? 'dark' : 'light'))" x-bind:class="dark ? 'dark' : ''">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DSNPRU REGISTRATION{% endblock %}</title>
    
    <!-- Fonts for Warm Editorial Academic identity -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS tokens and BEM styles -->
    <link rel="stylesheet" href="/static/css/custom.css?v=2.1">
    
    <!-- JS libraries loaded locally -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/sweetalert2.min.js"></script>
    <script src="/static/js/toastify.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/css/toastify.min.css">
    <script src="/static/js/chart.min.js"></script>
    <script src="/static/js/flatpickr.min.js"></script>
    <link rel="stylesheet" href="/static/css/flatpickr.min.css">
    <script src="/static/js/filesaver.min.js"></script>
    <script src="/static/js/html2pdf.min.js"></script>
    <script src="/static/js/sortable.min.js"></script>
    <link rel="stylesheet" href="/static/css/datatables.min.css">
    <script src="/static/js/datatables.min.js"></script>
    <script src="/static/js/main.js?v=1.2"></script>
    <script src="/static/js/alpine.min.js" defer></script>
    {% block head_extra %}{% endblock %}
</head>

<body>
    <header class="site-header" role="banner">
        <div class="container" x-data="{ open: false }">
            <nav class="nav-bar" aria-label="Main Navigation">
                <a href="/" class="nav-bar__brand" aria-label="DSNPRU Home">
                    <img src="/static/img/logo.png" alt="Logo" class="nav-bar__logo">
                    <div>
                        <div class="nav-bar__title">DSNPRU_REG</div>
                        <div class="nav-bar__subtitle">ระบบลงทะเบียนกิจกรรมโรงเรียน</div>
                    </div>
                </a>

                <!-- Navbar Desktop -->
                <div class="nav-bar__menu">
                    <a href="/" class="nav-bar__link">ลงทะเบียน</a>
                    <a href="/activities" class="nav-bar__link">ดูกิจกรรม</a>
                    <a href="/about" class="nav-bar__link">เกี่ยวกับเรา</a>

                    <button type="button" class="nav-bar__toggle" @click="dark = !dark" aria-label="Toggle Dark Mode">
                        <span x-show="!dark">โหมดมืด</span>
                        <span x-show="dark" x-cloak>โหมดสว่าง</span>
                    </button>
                </div>

                <!-- Mobile Toggle -->
                <div class="mobile-toggle">
                    <button type="button" class="nav-bar__toggle" @click="dark = !dark" aria-label="Toggle Dark Mode">
                        <span x-show="!dark">🌙</span>
                        <span x-show="dark" x-cloak>☀️</span>
                    </button>
                    <button @click="open = !open" class="nav-bar__toggle" aria-expanded="false" :aria-expanded="open.toString()">
                        <span x-show="!open">☰</span>
                        <span x-show="open" x-cloak>✕</span>
                    </button>
                </div>
            </nav>

            <!-- Mobile Menu -->
            <div x-show="open" x-cloak @click.away="open = false" class="mobile-menu">
                <a href="/" class="nav-bar__link">ลงทะเบียน</a>
                <a href="/activities" class="nav-bar__link">ดูกิจกรรม</a>
                <a href="/about" class="nav-bar__link">เกี่ยวกับเรา</a>
            </div>
        </div>
    </header>

    <!-- Announcement Banner -->
    <div id="announcement-banners" aria-live="polite"></div>
    <script>
        (async function() {
            try {
                const res = await axios.get('/api/announcements/active');
                const banners = res.data;
                if (!banners || banners.length === 0) return;
                
                const container = document.getElementById('announcement-banners');
                banners.forEach(ann => {
                    const div = document.createElement('div');
                    div.id = `ann-${ann.id}`;
                    div.className = `alert-banner`;
                    div.innerHTML = `
                        <span class="alert-banner__icon">ℹ️</span>
                        <span class="alert-banner__text">${ann.message}</span>
                        <button onclick="document.getElementById('ann-${ann.id}').remove()" class="alert-banner__close" title="ปิด">✕</button>
                    `;
                    container.appendChild(div);
                });
            } catch(e) { /* silently fail if no announcements */ }
        })();
    </script>

    <main class="site-main" role="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-wrap">
            <div class="footer-brand">
                <a href="/admin/login" class="nav-bar__title" style="font-size: 1rem; color: var(--color-primary);">DSNPRU REGISTRATION</a>
                <div class="nav-bar__subtitle">ระบบลงทะเบียนเข้าร่วมกิจกรรม</div>
            </div>
            <div class="footer-credits">
                <p>Designed & Developed with ❤️</p>
                <p>by <span style="font-weight: 700; color: var(--color-text-main);">ณัฐชนน รอดน้อย 04824</span></p>
            </div>
        </div>
    </footer>
</body>
</html>
