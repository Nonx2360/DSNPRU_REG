<!DOCTYPE html>
<html lang="th" x-data="{ dark: localStorage.getItem('theme') === 'dark' }"
    x-init="$watch('dark', v => localStorage.setItem('theme', v ? 'dark' : 'light'))" x-bind:class="dark ? 'dark' : ''">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DSNPRU REGISTRATION{% endblock %}</title>
    
    <!-- Fonts for Warm Editorial Academic identity -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS tokens and BEM styles -->
    <link rel="stylesheet" href="/static/css/custom.css?v=2.1">
    
    <!-- JS libraries loaded locally -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/sweetalert2.min.js"></script>
    <script src="/static/js/toastify.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/css/toastify.min.css">
    <script src="/static/js/chart.min.js"></script>
    <script src="/static/js/flatpickr.min.js"></script>
    <link rel="stylesheet" href="/static/css/flatpickr.min.css">
    <script src="/static/js/filesaver.min.js"></script>
    <script src="/static/js/html2pdf.min.js"></script>
    <script src="/static/js/sortable.min.js"></script>
    <link rel="stylesheet" href="/static/css/datatables.min.css">
    <script src="/static/js/datatables.min.js"></script>
    <script src="/static/js/main.js?v=1.2"></script>
    <script src="/static/js/alpine.min.js" defer></script>
    {% block head_extra %}{% endblock %}
</head>

<body>
    <header class="site-header" role="banner">
        <div class="container" x-data="{ open: false }">
            <nav class="nav-bar" aria-label="Main Navigation">
                <a href="/" class="nav-bar__brand" aria-label="DSNPRU Home">
                    <img src="/static/img/logo.png" alt="Logo" class="nav-bar__logo">
                    <div>
                        <div class="nav-bar__title">DSNPRU_REG</div>
                        <div class="nav-bar__subtitle">ระบบลงทะเบียนกิจกรรมโรงเรียน</div>
                    </div>
                </a>

                <!-- Navbar Desktop -->
                <div class="nav-bar__menu">
                    <a href="/" class="nav-bar__link">ลงทะเบียน</a>
                    <a href="/activities" class="nav-bar__link">ดูกิจกรรม</a>
                    <a href="/about" class="nav-bar__link">เกี่ยวกับเรา</a>

                    <button type="button" class="nav-bar__toggle" @click="dark = !dark" aria-label="Toggle Dark Mode">
                        <span x-show="!dark">โหมดมืด</span>
                        <span x-show="dark" x-cloak>โหมดสว่าง</span>
                    </button>
                </div>

                <!-- Mobile Toggle -->
                <div class="mobile-toggle">
                    <button type="button" class="nav-bar__toggle" @click="dark = !dark" aria-label="Toggle Dark Mode">
                        <span x-show="!dark"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-sm"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg></span>
                        <span x-show="dark" x-cloak><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-sm"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg></span>
                    </button>
                    <button @click="open = !open" class="nav-bar__toggle" aria-expanded="false" :aria-expanded="open.toString()">
                        <span x-show="!open">☰</span>
                        <span x-show="open" x-cloak>✕</span>
                    </button>
                </div>
            </nav>

            <!-- Mobile Menu -->
            <div x-show="open" x-cloak @click.away="open = false" class="mobile-menu">
                <a href="/" class="nav-bar__link">ลงทะเบียน</a>
                <a href="/activities" class="nav-bar__link">ดูกิจกรรม</a>
                <a href="/about" class="nav-bar__link">เกี่ยวกับเรา</a>
            </div>
        </div>
    </header>

    <!-- Announcement Banner -->
    <div id="announcement-banners" aria-live="polite"></div>
    <script>
        const loadAnnouncements = async () => {
            try {
                const res = await axios.get('/api/announcements/active');
                const banners = res.data;
                const container = document.getElementById('announcement-banners');
                container.innerHTML = '';
                
                if (!banners || banners.length === 0) return;
                
                banners.forEach(ann => {
                    const div = document.createElement('div');
                    div.id = `ann-${ann.id}`;
                    div.className = `alert-banner`;
                    
                    let bgColor = 'var(--color-primary)';
                    if (ann.color === 'rose') bgColor = '#e11d48';
                    else if (ann.color === 'indigo') bgColor = '#4f46e5';
                    else if (ann.color === 'emerald') bgColor = '#10b981';
                    else if (ann.color === 'amber') bgColor = '#f59e0b';
                    div.style.backgroundColor = bgColor;
                    
                    div.innerHTML = `
                        <span class="alert-banner__icon" style="display: flex; align-items: center;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-sm"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z" /></svg></span>
                        <span class="alert-banner__text">${ann.message}</span>
                        <button onclick="document.getElementById('ann-${ann.id}').remove()" class="alert-banner__close" title="ปิด" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; background: transparent; border: none; color: white; cursor: pointer; padding: 0;"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-sm"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg></button>
                    `;
                    container.appendChild(div);
                });
            } catch(e) { console.error("Error loading announcements:", e); }
        };

        const connectAnnouncementWs = () => {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${window.location.host}/ws/activities`);
            
            ws.onmessage = (event) => {
                if (event.data === 'update_announcements') {
                    loadAnnouncements();
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectAnnouncementWs, 3000);
            };
        };

        loadAnnouncements();
        connectAnnouncementWs();
    </script>

    <main class="site-main" role="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-wrap">
            <div class="footer-brand">
                <a href="/admin/login" class="nav-bar__title" style="font-size: 1rem; color: var(--color-primary);">DSNPRU REGISTRATION</a>
                <div class="nav-bar__subtitle">ระบบลงทะเบียนเข้าร่วมกิจกรรม</div>
            </div>
            <div class="footer-credits">
                <p>Designed & Developed with <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon-sm text-danger" style="display: inline-block; vertical-align: -3px;"><path d="m11.645 20.91-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z" /></svg></p>
                <p>by <span style="font-weight: 700; color: var(--color-text-main);">ณัฐชนน รอดน้อย 04824</span></p>
            </div>
        </div>
    </footer>
</body>
</html>
