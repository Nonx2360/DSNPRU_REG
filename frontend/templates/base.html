<!DOCTYPE html>
<html lang="th" x-data="{ dark: localStorage.getItem('theme') === 'dark' }"
    x-init="$watch('dark', v => localStorage.setItem('theme', v ? 'dark' : 'light'))" x-bind:class="dark ? 'dark' : ''">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DSNPRU_REG{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'ui-sans-serif', 'system-ui'],
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <!-- JS libraries - loaded locally -->
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/sweetalert2.min.js"></script>
    <script src="/static/js/toastify.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/static/css/toastify.min.css">
    <script src="/static/js/chart.min.js"></script>
    <script src="/static/js/flatpickr.min.js"></script>
    <link rel="stylesheet" href="/static/css/flatpickr.min.css">
    <script src="/static/js/filesaver.min.js"></script>
    <script src="/static/js/html2pdf.min.js"></script>
    <script src="/static/js/sortable.min.js"></script>
    <link rel="stylesheet" href="/static/css/datatables.min.css">
    <script src="/static/js/datatables.min.js"></script>
    <script src="/static/js/main.js?v=1.2"></script>
    <script src="/static/js/alpine.min.js" defer></script>
    {% block head_extra %}{% endblock %}
</head>

<body class="font-sans bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div id="spinner-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-40 items-center justify-center"></div>
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between" x-data="{ open: false }">
            <a href="/" class="flex items-center gap-3 hover:opacity-90 transition group">
                <img src="/static/img/logo.png" alt="Logo" class="w-10 h-10 object-contain">
                <div>
                    <div class="font-bold text-lg leading-tight text-slate-900 dark:text-white group-hover:text-rose-600 transition">DSNPRU_REG</div>
                    <div class="text-[11px] text-slate-500 dark:text-slate-400 transition">
                        ระบบลงทะเบียนกิจกรรมโรงเรียน</div>
                </div>
            </a>

            <!-- Navbar Desktop -->
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600 dark:text-slate-300">
                <a href="/" class="hover:text-rose-600 dark:hover:text-rose-400 transition">ลงทะเบียน</a>
                <a href="/activities" class="hover:text-rose-600 dark:hover:text-rose-400 transition">ดูกิจกรรม</a>
                <a href="/about" class="hover:text-rose-600 dark:hover:text-rose-400 transition">เกี่ยวกับเรา</a>

                <button type="button"
                    class="ml-2 px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition text-xs border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300"
                    @click="dark = !dark">
                    <span x-show="!dark">โหมดมืด</span>
                    <span x-show="dark">โหมดสว่าง</span>
                </button>
            </nav>

            <!-- Mobile Toggle -->
            <div class="flex items-center gap-2 md:hidden">
                <button type="button" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300" @click="dark = !dark">
                    <span x-show="!dark"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg></span>
                    <span x-show="dark"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                        </svg></span>
                </button>
                <button @click="open = !open" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                    <svg x-show="open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Mobile Menu -->
            <div x-show="open" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-4"
                @click.away="open = false"
                class="absolute top-full left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-xl md:hidden z-50">
                <div class="px-4 py-4 space-y-3 flex flex-col text-slate-700 dark:text-slate-300">
                    <a href="/"
                        class="px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition text-sm font-medium">ลงทะเบียน</a>
                    <a href="/activities"
                        class="px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition text-sm font-medium">ดูกิจกรรม</a>
                    <a href="/about"
                        class="px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition text-sm font-medium">เกี่ยวกับเรา</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Announcement Banner -->
    <div id="announcement-banners" class="w-full"></div>
    <script>
        (async function() {
            try {
                const res = await axios.get('/api/announcements/active');
                const banners = res.data;
                if (!banners || banners.length === 0) return;
                const colorMap = {
                    rose:    { bg: 'bg-rose-600', text: 'text-white', btn: 'hover:bg-rose-700' },
                    indigo:  { bg: 'bg-indigo-600', text: 'text-white', btn: 'hover:bg-indigo-700' },
                    emerald: { bg: 'bg-emerald-600', text: 'text-white', btn: 'hover:bg-emerald-700' },
                    amber:   { bg: 'bg-amber-500', text: 'text-white', btn: 'hover:bg-amber-600' },
                };
                const container = document.getElementById('announcement-banners');
                banners.forEach(ann => {
                    const c = colorMap[ann.color] || colorMap['indigo'];
                    const div = document.createElement('div');
                    div.id = `ann-${ann.id}`;
                    div.className = `${c.bg} ${c.text} w-full text-center text-sm font-medium py-2 px-4 flex items-center justify-center gap-3`;
                    div.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                        </svg>
                        <span>${ann.message}</span>
                        <button onclick="document.getElementById('ann-${ann.id}').remove()" class="ml-2 text-white/70 hover:text-white transition rounded-full p-0.5 ${c.btn}" title="ปิด">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>`;
                    container.appendChild(div);
                });
            } catch(e) { /* silently fail if no announcements */ }
        })();
    </script>

    <main class="max-w-6xl mx-auto px-4 py-8 flex-1 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-800 mt-auto bg-white dark:bg-slate-900 pb-4">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex flex-col items-center md:items-start gap-1">
                    <div class="flex items-center gap-2">
                        <div class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400 text-xs">
                            <a href="/admin/login" class="cursor-default hover:text-rose-500 transition">©</a>
                        </div>
                        <span class="text-sm font-bold tracking-tight text-slate-800 dark:text-slate-200">DSNPRU REGISTRATION</span>
                    </div>
                    <span class="text-xs text-slate-500 dark:text-slate-400 ml-8">ระบบลงทะเบียนเข้าร่วมกิจกรรม</span>
                </div>
                <div class="text-xs text-slate-500 dark:text-slate-400 text-center md:text-right">
                    <p>Designed & Developed with ❤️</p>
                    <p class="mt-1">by <span class="font-medium text-slate-700 dark:text-slate-300">ณัฐชนน รอดน้อย 04824</span></p>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
