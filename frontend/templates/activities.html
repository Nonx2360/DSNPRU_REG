{% extends "base.html" %}
{% block title %}ดูกิจกรรมทั้งหมด - DSNPRU_REG{% endblock %}
{% block head_extra %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('activitiesPage', () => ({
            activities: [],
            searchQuery: '',
            now: new Date(),
            groupedActivities() {
                const groups = {};
                // Filter activities based on search query
                const filtered = this.activities.filter(a => {
                    if (!this.searchQuery) return true;
                    const query = this.searchQuery.toLowerCase();
                    return (a.title && a.title.toLowerCase().includes(query)) ||
                        (a.description && a.description.toLowerCase().includes(query)) ||
                        (a.group_name && a.group_name.toLowerCase().includes(query));
                });

                filtered.forEach(a => {
                    const groupName = a.group_name || 'อื่นๆ (กิจกรรมทั่วไป)';
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(a);
                });
                return groups;
            },
            async load() {
                const res = await axios.get('/api/activities');
                this.activities = res.data;

                const connectWs = () => {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const ws = new WebSocket(`${protocol}//${window.location.host}/ws/activities`);
                    
                    ws.onmessage = async (event) => {
                        if (event.data === 'update_activities') {
                            const refreshRes = await axios.get('/api/activities');
                            this.activities = refreshRes.data;
                        }
                    };
                    
                    ws.onclose = () => {
                        setTimeout(connectWs, 3000);
                    };
                };
                
                connectWs();

                // Real-time: Refresh UI timers every minute
                setInterval(() => {
                    this.now = new Date();
                }, 60000);
            },
            getTimeLeft(endTimeStr) {
                if (!endTimeStr) return null;
                const end = new Date(endTimeStr);
                const diff = end - this.now;
                if (diff <= 0) return { text: 'หมดเวลาสมัคร', colorClass: 'badge--danger' };
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                
                let text = 'เหลือเวลา ';
                if (days > 0) text += days + ' วัน ';
                if (hours > 0) text += hours + ' ชม. ';
                if (days === 0 && hours === 0) text += mins + ' นาที';
                
                let colorClass = 'badge--success';
                if (days < 2 && days >= 0) colorClass = 'badge--warning';
                if (days === 0 && hours < 12) colorClass = 'badge--danger text-danger';
                
                return { text, colorClass };
            }
        }));
    });
</script>
{% endblock %}
{% block content %}
<section x-data="activitiesPage()" x-init="load()">
    <header class="mb-lg">
        <a href="/" class="btn btn--outline mb-sm" style="font-size: 0.75rem; padding: 4px 8px; border: none; background: transparent;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon-sm">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            กลับไปหน้าแรก
        </a>
        <h1>ดูกิจกรรมทั้งหมด</h1>
        <p class="text-muted">รายชื่อกิจกรรมที่เปิดรับสมัครในขณะนี้และสถานะจำนวนที่นั่ง</p>
    </header>

    <!-- Search Bar Section -->
    <div class="card mb-lg" style="display: flex; gap: var(--space-sm); align-items: center; padding: var(--space-sm) var(--space-md);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="icon-md" style="color: var(--color-text-muted);">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <input type="text" x-model="searchQuery" placeholder="ค้นหากิจกรรมด้วยชื่อ รายละเอียด หรือกลุ่ม..."
            class="form-input" style="flex: 1; border: none; box-shadow: none; background: transparent;">
        <button class="btn btn--accent">ค้นหา</button>
    </div>

    <div>
        <template x-if="Object.keys(groupedActivities()).length === 0">
            <div class="card text-center" style="padding: var(--space-2xl) var(--space-md); border-style: dashed;">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-xl mb-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="color: var(--color-text-muted); margin: 0 auto;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p style="font-weight: 600;">ไม่พบกิจกรรมที่คุณกำลังค้นหา</p>
                <button @click="searchQuery = ''" class="btn btn--outline mt-sm" style="border: none;">ล้างการค้นหา</button>
            </div>
        </template>

        <template x-for="(groupActs, groupName) in groupedActivities()" :key="groupName">
            <div class="mb-xl">
                <div class="group-divider">
                    <span class="group-divider__text" x-text="groupName"></span>
                    <div class="group-divider__line"></div>
                </div>
                
                <div class="grid-cards" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
                    <template x-for="activity in groupActs" :key="activity.id">
                        <div class="activity-card cursor-default">
                            <div class="activity-card__header">
                                <div style="flex: 1;">
                                    <h3 class="activity-card__title" x-text="activity.title"></h3>
                                    <div class="activity-card__desc line-clamp-2" x-text="activity.description"></div>
                                    <div style="margin-top: var(--space-sm); display: flex; gap: var(--space-xs); flex-wrap: wrap;">
                                        <template x-if="activity.allowed_classrooms">
                                            <span class="badge" x-text="'ห้อง: ' + activity.allowed_classrooms"></span>
                                        </template>
                                        <template x-if="activity.start_time">
                                            <span class="badge badge--info" x-text="new Date(activity.start_time).toLocaleString('th-TH', {dateStyle: 'short', timeStyle: 'short'})"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="activity-card__badges">
                                    <span class="badge" :class="activity.status === 'open' ? 'badge--success' : 'badge--warning'"
                                          x-text="activity.status === 'open' ? 'เปิดรับสมัคร' : 'ปิดรับสมัคร'"></span>
                                    
                                    <template x-if="activity.end_time && activity.status !== 'close'">
                                        <span class="badge" :class="getTimeLeft(activity.end_time).colorClass"
                                              x-text="getTimeLeft(activity.end_time).text"></span>
                                    </template>
                                    
                                    <template x-if="activity.type === 'team'">
                                        <span class="badge badge--info">TEAM (Max <span x-text="activity.max_team_size"></span>)</span>
                                    </template>
                                </div>
                            </div>
                            
                            <div class="activity-card__footer">
                                <div class="progress-header">
                                    <span>สถานะที่นั่ง:</span>
                                    <span>
                                        <span x-show="activity.remaining_seats > 0" x-cloak>ผู้สมัคร <span x-text="activity.registered_count"></span> / <span x-text="activity.max_people"></span> (ว่าง <span x-text="activity.remaining_seats"></span>)</span>
                                        <span x-show="activity.remaining_seats === 0" class="text-danger" x-cloak>เต็ม (สำรองคิวได้)</span>
                                    </span>
                                </div>
                                <div class="progress-track" role="progressbar" :aria-valuenow="activity.max_people - activity.remaining_seats" :aria-valuemax="activity.max_people">
                                    <div class="progress-fill" 
                                        :style="`width: ${(1 - (activity.remaining_seats / activity.max_people)) * 100}%`">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</section>
{% endblock %}
