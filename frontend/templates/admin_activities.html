{% extends "base.html" %}
{% block title %}จัดการกิจกรรม - DSNPRU_REG{% endblock %}
{% block head_extra %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('adminActivitiesPage', () => ({
            activities: [],
            groups: [],
            classrooms: [],
            form: { title: '', description: '', max_people: 30, status: 'open', group_id: null, allowed_classrooms: [], start_time: null, end_time: null, color: '#D95D39', type: 'individual', max_team_size: 1 },
            groupForm: { name: '', quota: 3, allowed_classrooms: [], is_visible: true },
            showGroupManager: false,
            async load() {
                const token = sessionStorage.getItem('adminToken');
                if (!token) { window.location.href = '/admin/login'; return; }
                const [actRes, groupRes, classRes] = await Promise.all([
                    axios.get('/admin/api/activities', { headers: { Authorization: 'Bearer ' + token } }),
                    axios.get('/admin/api/activity_groups', { headers: { Authorization: 'Bearer ' + token } }),
                    axios.get('/admin/api/classrooms', { headers: { Authorization: 'Bearer ' + token } })
                ]);
                this.activities = actRes.data.map(a => ({
                    ...a,
                    allowed_classrooms: a.allowed_classrooms ? a.allowed_classrooms.split(',').map(c => c.trim()) : []
                }));
                this.groups = groupRes.data.map(g => ({
                    ...g,
                    allowed_classrooms: g.allowed_classrooms ? g.allowed_classrooms.split(',').map(c => c.trim()) : []
                }));
                this.classrooms = classRes.data;

                const connectWs = () => {
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const ws = new WebSocket(`${protocol}//${window.location.host}/ws/activities`);
                    
                    ws.onmessage = async (event) => {
                        if (event.data === 'update_activities') {
                            const refreshActRes = await axios.get('/admin/api/activities', { headers: { Authorization: 'Bearer ' + token } });
                            this.activities = refreshActRes.data.map(a => ({
                                ...a,
                                allowed_classrooms: a.allowed_classrooms ? a.allowed_classrooms.split(',').map(c => c.trim()) : []
                            }));
                        }
                    };
                    
                    ws.onclose = () => {
                        setTimeout(connectWs, 3000);
                    };
                };
                
                if (!this.wsConnected) {
                    connectWs();
                    this.wsConnected = true;
                }
            },
            async createActivity() {
                const token = sessionStorage.getItem('adminToken');
                const payload = { ...this.form, allowed_classrooms: this.form.allowed_classrooms.join(',') };
                try {
                    const res = await axios.post('/admin/create_activity', payload, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.activities.push({ ...res.data, allowed_classrooms: res.data.allowed_classrooms ? res.data.allowed_classrooms.split(',') : [] });
                    this.form = { title: '', description: '', max_people: 30, status: 'open', group_id: null, allowed_classrooms: [], start_time: null, end_time: null, color: '#D95D39', type: 'individual', max_team_size: 1 };
                    Toastify({ text: 'สร้างกิจกรรมสำเร็จ', backgroundColor: '#10b981' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถสร้างกิจกรรมได้', 'error');
                }
            },
            async createGroup() {
                const token = sessionStorage.getItem('adminToken');
                const payload = { ...this.groupForm, allowed_classrooms: this.groupForm.allowed_classrooms.join(',') };
                try {
                    const res = await axios.post('/admin/api/activity_groups', payload, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.groups.push({ ...res.data, allowed_classrooms: res.data.allowed_classrooms ? res.data.allowed_classrooms.split(',') : [] });
                    this.groupForm.name = '';
                    this.groupForm.allowed_classrooms = [];
                    Toastify({ text: 'สร้างกลุ่มสำเร็จ', backgroundColor: '#10b981' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถสร้างกลุ่มได้', 'error');
                }
            },
            async removeGroup(groupId) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบกลุ่ม?',
                    text: 'กิจกรรมในกลุ่มนี้จะไม่ถูกลบแต่จะไม่มีกลุ่ม',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#D95D39',
                    confirmButtonText: 'ยืนยันการลบ',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/api/activity_groups/${groupId}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.groups = this.groups.filter(g => g.id !== groupId);
                    this.load();
                    Toastify({ text: 'ลบกลุ่มสำเร็จ', backgroundColor: '#D95D39' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถลบกลุ่มได้', 'error');
                }
            },
            async toggle(activity) {
                const action = activity.status === 'open' ? 'ปิดรับสมัคร' : 'เปิดรับสมัคร';
                const { isConfirmed } = await Swal.fire({
                    title: `ยืนยัน${action}?`,
                    text: `คุณต้องการ${action}กิจกรรม "${activity.title}" ใช่หรือไม่?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: activity.status === 'open' ? '#a1a1aa' : '#10b981',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    const res = await axios.post(`/admin/activities/${activity.id}/toggle`, {}, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    const idx = this.activities.findIndex(a => a.id === activity.id);
                    if (idx !== -1) this.activities[idx] = res.data;
                    Toastify({ text: `เปลี่ยนสถานะเป็น ${res.data.status === 'open' ? 'เปิด' : 'ปิด'} เรียบร้อย`, backgroundColor: '#3b82f6' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถเปลี่ยนสถานะได้', 'error');
                }
            },
            async remove(activity) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบกิจกรรม?',
                    text: `ชื่อกิจกรรม: ${activity.title}\nการลบนี้จะไม่สามารถย้อนคืนได้ และข้อมูลการสมัครทั้งหมดจะหายไป`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#D95D39',
                    confirmButtonText: 'ยืนยันการลบ',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/activities/${activity.id}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.activities = this.activities.filter(a => a.id !== activity.id);
                    Toastify({ text: 'ลบกิจกรรมสำเร็จ', backgroundColor: '#D95D39' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถลบกิจกรรมได้', 'error');
                }
            }
        }));
    });
</script>
{% endblock %}
{% block content %}
<section x-data="adminActivitiesPage()" x-init="load()">
    <header class="mb-lg" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
        <div>
            <h1 style="margin: 0;">จัดการกิจกรรม</h1>
            <p class="text-muted" style="margin-top: var(--space-xs); font-size: 0.75rem;">ตั้งค่ากิจกรรมและกลุ่มกิจกรรมสำหรับนักเรียน</p>
        </div>
        <div style="display: flex; gap: var(--space-sm); align-items: center;">
            <button @click="showGroupManager = !showGroupManager" class="btn btn--outline" style="font-size: 0.75rem; color: var(--color-warning);">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span x-text="showGroupManager ? 'ปิดจัดการกลุ่ม' : 'จัดการกลุ่มกิจกรรม'"></span>
            </button>
            <a href="/admin/dashboard" class="btn btn--outline" style="font-size: 0.75rem;">กลับแดชบอร์ด</a>
        </div>
    </header>

    <!-- Group Manager -->
    <div x-show="showGroupManager" x-cloak class="card mb-xl border-dashed">
        <h2 class="text-muted mb-md" style="font-size: 0.875rem; letter-spacing: 1px; display: flex; align-items: center; gap: var(--space-sm); text-transform: uppercase;">
            <div class="badge badge--warning border-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            จัดการกลุ่มกิจกรรม
        </h2>

        <div style="display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: center; margin-bottom: var(--space-md);">
            <div class="form-group" style="margin: 0; flex: 1; min-width: 200px;">
                <input type="text" x-model="groupForm.name" class="form-input" placeholder="ชื่อกลุ่มใหม่">
            </div>
            <div style="display: flex; align-items: center; gap: var(--space-xs);">
                <label class="form-label" style="margin: 0;">โควตา:</label>
                <input type="number" x-model.number="groupForm.quota" min="1" max="10" class="form-input" style="width: 60px; padding: 4px;">
            </div>
            <div style="display: flex; align-items: center; gap: var(--space-xs);">
                <label class="form-label" style="margin: 0;">แสดงผล:</label>
                <input type="checkbox" x-model="groupForm.is_visible" style="cursor: pointer;">
            </div>
            <button @click="createGroup" class="btn btn--accent" style="padding: 6px 12px; font-size: 0.75rem;">เพิ่มกลุ่ม</button>
        </div>
        
        <div class="form-group mb-md">
            <label class="form-label">จำกัดห้องเรียน (เว้นว่างหากให้เข้าได้ทุกห้อง):</label>
            <div style="display: flex; flex-wrap: wrap; gap: var(--space-sm); background: var(--color-background); padding: var(--space-sm); border: 1px solid var(--color-border); border-radius: var(--radius-sm);">
                <template x-for="cls in classrooms" :key="cls">
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 0.75rem; cursor: pointer;">
                        <input type="checkbox" :value="cls" x-model="groupForm.allowed_classrooms">
                        <span x-text="cls" class="text-muted"></span>
                    </label>
                </template>
            </div>
        </div>

        <div style="display: flex; flex-wrap: wrap; gap: var(--space-sm); padding-top: var(--space-sm); border-top: 1px dashed var(--color-border);">
            <template x-for="group in groups" :key="group.id">
                <div class="badge" style="display: flex; align-items: center; gap: var(--space-xs);">
                    <span x-text="group.name" style="font-weight: 700;"></span>
                    <span class="text-muted" x-text="'(โควตา: ' + group.quota + ')'"></span>
                    <span x-show="!group.is_visible" style="font-style: italic; opacity: 0.6;">(ซ่อน)</span>
                    <span x-show="group.allowed_classrooms.length" class="text-danger" x-text="'[' + group.allowed_classrooms + ']'"></span>
                    <button @click="removeGroup(group.id)" style="background: transparent; border: none; font-size: 1rem; line-height: 1; cursor: pointer; color: var(--color-danger); opacity: 0.7;">&times;</button>
                </div>
            </template>
            <div x-show="groups.length === 0" class="text-muted" style="font-size: 0.75rem; width: 100%;">ไม่มีกลุ่มกิจกรรม</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr; gap: var(--space-xl);">
        <div style="display: flex; flex-direction: row; flex-wrap: wrap; gap: var(--space-lg);">
            
            <!-- Left Pane: Create Form -->
            <div class="card" style="flex: 1; min-width: 300px; max-width: 400px; height: fit-content; border: 2px solid var(--color-border);">
                <h2 class="text-muted mb-md" style="font-size: 0.875rem; letter-spacing: 1px; display: flex; align-items: center; gap: var(--space-sm); text-transform: uppercase;">
                    <div class="badge badge--success border-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                        </svg>
                    </div>
                    สร้างกิจกรรมใหม่
                </h2>
                
                <div class="form-group">
                    <label class="form-label">ชื่อกิจกรรม</label>
                    <input type="text" x-model="form.title" class="form-input">
                </div>
                
                <div class="form-group">
                    <label class="form-label">กลุ่มกิจกรรม</label>
                    <select x-model.number="form.group_id" class="form-input">
                        <option :value="null">-- ไม่มีกลุ่ม --</option>
                        <template x-for="group in groups" :key="group.id">
                            <option :value="group.id" x-text="group.name"></option>
                        </template>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">รายละเอียด</label>
                    <textarea x-model="form.description" class="form-input" style="min-height: 80px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">จำกัดห้องเรียน (เว้นว่าง = ทุกห้อง)</label>
                    <div style="display: flex; flex-wrap: wrap; gap: var(--space-sm); background: var(--color-background); padding: var(--space-sm); border: 1px solid var(--color-border); border-radius: var(--radius-sm); max-height: 120px; overflow-y: auto;">
                        <template x-for="cls in classrooms" :key="cls">
                            <label style="display: flex; align-items: center; gap: 4px; font-size: 0.75rem; cursor: pointer;">
                                <input type="checkbox" :value="cls" x-model="form.allowed_classrooms">
                                <span x-text="cls" class="text-muted"></span>
                            </label>
                        </template>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);">
                    <div class="form-group">
                        <label class="form-label">ประเภทกิจกรรม</label>
                        <select x-model="form.type" class="form-input">
                            <option value="individual">เดี่ยว</option>
                            <option value="team">ทีม/คู่</option>
                        </select>
                    </div>
                    <div class="form-group" x-show="form.type === 'team'" x-cloak>
                        <label class="form-label">จำนวนคนต่อทีม</label>
                        <input type="number" x-model.number="form.max_team_size" min="2" max="10" class="form-input">
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);">
                    <div class="form-group">
                        <label class="form-label">วันเริ่ม</label>
                        <input type="datetime-local" x-model="form.start_time" class="form-input" style="font-size: 0.75rem;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">วันสิ้นสุด</label>
                        <input type="datetime-local" x-model="form.end_time" class="form-input" style="font-size: 0.75rem;">
                    </div>
                </div>

                <div style="display: flex; gap: var(--space-md);">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">จำนวนรับสูงสุด</label>
                        <input type="number" x-model.number="form.max_people" min="1" class="form-input">
                    </div>
                    <div class="form-group" style="width: 60px;">
                        <label class="form-label">สีน้ำ</label>
                        <input type="color" x-model="form.color" class="form-input" style="padding: 2px; cursor: pointer; height: 38px;">
                    </div>
                </div>

                <button type="button" @click="createActivity" class="btn btn--accent" style="width: 100%; margin-top: var(--space-sm);">
                    บันทึกกิจกรรม
                </button>
            </div>

            <!-- Right Pane: List Activities -->
            <div style="flex: 2; min-width: 300px;">
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-md);">
                    <template x-for="activity in activities" :key="activity.id">
                        <div class="card" style="position: relative; padding-top: var(--space-lg); display: flex; flex-direction: column;">
                            <!-- Top Decor Line -->
                            <div style="position: absolute; top: -1px; left: -1px; right: -1px; height: 6px; border-radius: var(--radius-md) var(--radius-md) 0 0;" :style="`background-color: ${activity.color}`"></div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-xs);">
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <span x-show="activity.group_name" x-text="activity.group_name" class="badge"></span>
                                    <h3 style="margin: 0; font-size: 1.1rem; padding-right: 50px;" x-text="activity.title"></h3>
                                </div>
                                
                                <span class="badge" style="position: absolute; top: var(--space-md); right: var(--space-md);" :class="activity.status === 'open' ? 'badge--success border-none' : 'badge--warning border-none'">
                                    <span x-text="activity.status === 'open' ? 'เปิด' : 'ปิด'"></span>
                                </span>
                            </div>

                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: var(--space-sm); line-height: 1.4;" x-text="activity.description || 'ไม่มีคำอธิบาย'"></p>
                            
                            <div style="display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-bottom: var(--space-sm);">
                                <template x-if="activity.allowed_classrooms && activity.allowed_classrooms.length > 0 && activity.allowed_classrooms[0] !== ''">
                                    <span class="badge badge--info border-none" style="font-size: 0.65rem;" x-text="'เฉพาะห้อง: ' + activity.allowed_classrooms"></span>
                                </template>
                                <template x-if="activity.start_time">
                                    <span class="badge badge--success border-none" style="font-size: 0.65rem;" x-text="'เปิด: ' + new Date(activity.start_time).toLocaleString('th-TH')"></span>
                                </template>
                                <template x-if="activity.end_time">
                                    <span class="badge badge--danger border-none" style="font-size: 0.65rem;" x-text="'ปิด: ' + new Date(activity.end_time).toLocaleString('th-TH')"></span>
                                </template>
                            </div>
                            
                            <div style="margin-top: auto; padding-top: var(--space-sm); padding-bottom: var(--space-md); border-bottom: 1px dashed var(--color-border); font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center;">
                                <span class="text-muted">ผู้สมัคร: <strong style="color: var(--color-text-main);" x-text="activity.registered_count"></strong> / <span x-text="activity.max_people"></span></span>
                                <span style="font-weight: 700;" :style="activity.remaining_seats > 0 ? 'color: var(--color-success);' : 'color: var(--color-danger);'" x-text="'เหลือ ' + activity.remaining_seats + ' ที่'"></span>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-xs); margin-top: var(--space-sm);">
                                <button class="btn btn--outline" style="font-size: 0.75rem; padding: 4px;" :style="activity.status === 'open' ? 'color: var(--color-warning);' : 'color: var(--color-success);'" @click="toggle(activity)">
                                    <span x-text="activity.status === 'open' ? 'ปิดรับด่วน' : 'กลับมาเปิด'"></span>
                                </button>
                                <button class="btn btn--outline" style="font-size: 0.75rem; padding: 4px; color: var(--color-danger);" @click="remove(activity)">
                                    ลบ
                                </button>
                                <a :href="`/admin/activity/${activity.id}`" class="btn btn--primary" style="font-size: 0.75rem; padding: 4px; text-decoration: none;">
                                    จัดการ
                                </a>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
