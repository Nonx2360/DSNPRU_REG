{% extends "base.html" %}
{% block title %}จัดการกิจกรรม - DSNPRU_REG{% endblock %}
{% block head_extra %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('adminActivitiesPage', () => ({
            activities: [],
            groups: [],
            classrooms: [],
            form: { title: '', description: '', max_people: 30, status: 'open', group_id: null, allowed_classrooms: [], start_time: null, end_time: null, color: '#e11d48', type: 'individual', max_team_size: 1 },
            groupForm: { name: '', quota: 3, allowed_classrooms: [], is_visible: true },
            showGroupManager: false,
            async load() {
                const token = sessionStorage.getItem('adminToken');
                if (!token) { window.location.href = '/admin/login'; return; }
                const [actRes, groupRes, classRes] = await Promise.all([
                    axios.get('/admin/api/activities', { headers: { Authorization: 'Bearer ' + token } }),
                    axios.get('/admin/api/activity_groups', { headers: { Authorization: 'Bearer ' + token } }),
                    axios.get('/admin/api/classrooms', { headers: { Authorization: 'Bearer ' + token } })
                ]);
                this.activities = actRes.data.map(a => ({
                    ...a,
                    allowed_classrooms: a.allowed_classrooms ? a.allowed_classrooms.split(',').map(c => c.trim()) : []
                }));
                this.groups = groupRes.data.map(g => ({
                    ...g,
                    allowed_classrooms: g.allowed_classrooms ? g.allowed_classrooms.split(',').map(c => c.trim()) : []
                }));
                this.classrooms = classRes.data;
            },
            async createActivity() {
                const token = sessionStorage.getItem('adminToken');
                const payload = { ...this.form, allowed_classrooms: this.form.allowed_classrooms.join(',') };
                try {
                    const res = await axios.post('/admin/create_activity', payload, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.activities.push({ ...res.data, allowed_classrooms: res.data.allowed_classrooms ? res.data.allowed_classrooms.split(',') : [] });
                    this.form = { title: '', description: '', max_people: 30, status: 'open', group_id: null, allowed_classrooms: [], start_time: null, end_time: null, color: '#e11d48', type: 'individual', max_team_size: 1 };
                    Toastify({ text: 'สร้างกิจกรรมสำเร็จ', backgroundColor: '#16a34a' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถสร้างกิจกรรมได้', 'error');
                }
            },
            async createGroup() {
                const token = sessionStorage.getItem('adminToken');
                const payload = { ...this.groupForm, allowed_classrooms: this.groupForm.allowed_classrooms.join(',') };
                try {
                    const res = await axios.post('/admin/api/activity_groups', payload, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.groups.push({ ...res.data, allowed_classrooms: res.data.allowed_classrooms ? res.data.allowed_classrooms.split(',') : [] });
                    this.groupForm.name = '';
                    this.groupForm.allowed_classrooms = [];
                    Toastify({ text: 'สร้างกลุ่มสำเร็จ', backgroundColor: '#16a34a' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถสร้างกลุ่มได้', 'error');
                }
            },
            async removeGroup(groupId) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบกลุ่ม?',
                    text: 'กิจกรรมในกลุ่มนี้จะไม่ถูกลบแต่จะไม่มีกลุ่ม',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e11d48',
                    confirmButtonText: 'ยืนยันการลบ',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/api/activity_groups/${groupId}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.groups = this.groups.filter(g => g.id !== groupId);
                    this.load(); // Refresh activities to clear group info
                    Toastify({ text: 'ลบกลุ่มสำเร็จ', backgroundColor: '#e11d48' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถลบกลุ่มได้', 'error');
                }
            },
            async toggle(activity) {
                const action = activity.status === 'open' ? 'ปิดรับสมัคร' : 'เปิดรับสมัคร';
                const { isConfirmed } = await Swal.fire({
                    title: `ยืนยัน${action}?`,
                    text: `คุณต้องการ${action}กิจกรรม "${activity.title}" ใช่หรือไม่?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: activity.status === 'open' ? '#64748b' : '#10b981',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    const res = await axios.post(`/admin/activities/${activity.id}/toggle`, {}, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    const idx = this.activities.findIndex(a => a.id === activity.id);
                    if (idx !== -1) this.activities[idx] = res.data;
                    Toastify({ text: `เปลี่ยนสถานะเป็น ${res.data.status === 'open' ? 'เปิด' : 'ปิด'} เรียบร้อย`, backgroundColor: '#4f46e5' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถเปลี่ยนสถานะได้', 'error');
                }
            },
            async remove(activity) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบกิจกรรม?',
                    text: `ชื่อกิจกรรม: ${activity.title}\nการลบนี้จะไม่สามารถย้อนคืนได้ และข้อมูลการสมัครทั้งหมดจะหายไป`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e11d48',
                    confirmButtonText: 'ยืนยันการลบ',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/activities/${activity.id}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.activities = this.activities.filter(a => a.id !== activity.id);
                    Toastify({ text: 'ลบกิจกรรมสำเร็จ', backgroundColor: '#e11d48' }).showToast();
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถลบกิจกรรมได้', 'error');
                }
            }
        }));
    });
</script>
{% endblock %}
{% block content %}
<section x-data="adminActivitiesPage()" x-init="load()">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-semibold">จัดการกิจกรรม</h1>
            <p class="text-xs text-slate-500 mt-1">ตั้งค่ากิจกรรมและกลุ่มกิจกรรมสำหรับนักเรียน</p>
        </div>
        <div class="flex flex-wrap gap-2 text-[11px] sm:text-xs">
            <button @click="showGroupManager = !showGroupManager"
                class="px-4 py-2 rounded-xl bg-orange-50 text-orange-700 border border-orange-200 hover:bg-orange-100 dark:bg-orange-900/30 dark:text-orange-400 dark:border-orange-800 transition font-semibold shadow-sm flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span x-text="showGroupManager ? 'ปิดจัดการกลุ่ม' : 'จัดการกลุ่มกิจกรรม'"></span>
            </button>
            <a href="/admin/dashboard"
                class="px-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 transition font-semibold shadow-sm flex items-center">กลับแดชบอร์ด</a>
        </div>
    </div>

    <!-- Group Manager -->
    <div x-show="showGroupManager" x-collapse
        class="mb-8 p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm">
        <h2 class="text-sm font-bold uppercase tracking-widest text-slate-800 dark:text-slate-100 mb-6 flex items-center gap-2">
            <div class="p-1.5 bg-orange-100 dark:bg-orange-900/30 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            จัดการกลุ่มกิจกรรม
        </h2>
        <div class="flex flex-col gap-4 mb-4">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" x-model="groupForm.name" placeholder="ชื่อกลุ่มใหม่"
                    class="flex-1 rounded-md border-rose-200 dark:border-slate-700 dark:bg-slate-900 text-sm px-3 py-1.5 focus:ring-rose-500">
                <div class="flex items-center gap-2">
                    <label class="text-[10px] text-rose-500 dark:text-rose-400 font-medium">โควตา:</label>
                    <input type="number" x-model.number="groupForm.quota" min="1" max="10"
                        class="w-16 rounded-md border-rose-200 dark:border-slate-700 dark:bg-slate-900 text-sm px-2 py-1.5 focus:ring-rose-500">
                </div>
                <div class="flex items-center gap-2 px-2">
                    <label
                        class="text-[10px] text-rose-500 dark:text-rose-400 font-medium whitespace-nowrap">แสดงผล:</label>
                    <input type="checkbox" x-model="groupForm.is_visible"
                        class="rounded border-rose-200 dark:border-slate-700 text-rose-600 focus:ring-rose-500">
                </div>
                <button @click="createGroup"
                    class="px-4 py-1.5 bg-rose-600 text-white rounded-md text-sm hover:bg-rose-700 whitespace-nowrap shadow-sm">
                    เพิ่มกลุ่ม
                </button>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[10px] text-rose-500 dark:text-rose-400 font-medium">จำกัดห้องเรียน
                    (เว้นว่างหากให้เข้าได้ทุกห้อง):</label>
                <div
                    class="flex flex-wrap gap-2 p-2 bg-white dark:bg-slate-900/50 rounded-md border border-rose-200 dark:border-slate-700">
                    <template x-for="cls in classrooms" :key="cls">
                        <label class="flex items-center gap-1 text-xs cursor-pointer hover:text-rose-600 transition">
                            <input type="checkbox" :value="cls" x-model="groupForm.allowed_classrooms"
                                class="rounded border-rose-200 dark:border-slate-700 text-rose-600 focus:ring-rose-500">
                            <span x-text="cls" class="dark:text-slate-300"></span>
                        </label>
                    </template>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap gap-2">
            <template x-for="group in groups" :key="group.id">
                <div
                    class="flex items-center gap-2 px-3 py-1 bg-white dark:bg-slate-900 border border-rose-200 dark:border-rose-900/50 rounded-full text-xs shadow-sm">
                    <span x-text="group.name" class="font-medium dark:text-slate-200"></span>
                    <span class="text-[10px] text-rose-400 dark:text-rose-500"
                        x-text="'(โควตา: ' + group.quota + ')'"></span>
                    <span x-show="!group.is_visible"
                        class="text-[10px] text-rose-300 dark:text-slate-500 italic">(ซ่อน)</span>
                    <span x-show="group.allowed_classrooms" class="text-[10px] text-rose-500 dark:text-rose-400/80"
                        x-text="'[' + group.allowed_classrooms + ']'"></span>
                    <button @click="removeGroup(group.id)"
                        class="text-rose-400 hover:text-rose-600 dark:text-slate-500 dark:hover:text-rose-400 ml-1 transition">&times;</button>
                </div>
            </template>
        </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6 mb-8">
        <div
            class="md:col-span-1 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 shadow-sm space-y-4 h-fit">
            <h2 class="text-sm font-bold uppercase tracking-widest text-slate-800 dark:text-slate-100 mb-2 flex items-center gap-2">
                <div class="p-1.5 bg-emerald-100 dark:bg-emerald-900/30 rounded-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                </div>
                สร้างกิจกรรมใหม่
            </h2>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">ชื่อกิจกรรม</label>
                <input type="text" x-model="form.title"
                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">กลุ่มกิจกรรม</label>
                <select x-model.number="form.group_id"
                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                    <option :value="null">-- ไม่มีกลุ่ม --</option>
                    <template x-for="group in groups" :key="group.id">
                        <option :value="group.id" x-text="group.name"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">รายละเอียด</label>
                <textarea x-model="form.description"
                    class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm"></textarea>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">จำกัดห้องเรียน (เว้นว่าง = ทุกห้อง)</label>
                <div
                    class="flex flex-wrap gap-2 p-3 bg-slate-50/50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700 max-h-32 overflow-y-auto">
                    <template x-for="cls in classrooms" :key="cls">
                        <label class="flex items-center gap-1.5 text-xs cursor-pointer hover:text-rose-600 transition font-medium">
                            <input type="checkbox" :value="cls" x-model="form.allowed_classrooms"
                                class="rounded border-slate-300 dark:border-slate-600 text-rose-600 focus:ring-rose-500 cursor-pointer">
                            <span x-text="cls" class="dark:text-slate-300"></span>
                        </label>
                    </template>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">ประเภทกิจกรรม</label>
                    <select x-model="form.type" class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                        <option value="individual">เดี่ยว</option>
                        <option value="team">ทีม/คู่</option>
                    </select>
                </div>
                <div x-show="form.type === 'team'" x-transition>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">จำนวนคนต่อทีม</label>
                    <input type="number" x-model.number="form.max_team_size" min="2" max="10"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">วันเริ่ม</label>
                    <input type="datetime-local" x-model="form.start_time"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-[11px] px-3 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">วันสิ้นสุด</label>
                    <input type="datetime-local" x-model="form.end_time"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-[11px] px-3 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">จำนวนรับสูงสุด</label>
                    <input type="number" x-model.number="form.max_people" min="1"
                        class="w-full rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-sm px-4 py-2.5 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition shadow-sm">
                </div>
                <div class="w-20">
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 opacity-80">สีนำ</label>
                    <input type="color" x-model="form.color"
                        class="w-full h-11 rounded-xl border-slate-200 dark:border-slate-700 dark:bg-slate-800 p-1 cursor-pointer outline-none focus:ring-2 focus:ring-rose-500/20">
                </div>
            </div>
            <button type="button" @click="createActivity"
                class="w-full mt-4 inline-flex justify-center items-center px-4 py-3 rounded-xl bg-rose-600 hover:bg-rose-700 text-white text-sm font-bold tracking-wide shadow-md shadow-rose-500/20 active:scale-95 transition-all">
                บันทึกกิจกรรม
            </button>
        </div>
        <div class="md:col-span-2">
            <div class="grid sm:grid-cols-2 gap-4">
                <template x-for="activity in activities" :key="activity.id">
                    <div class="relative overflow-hidden rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 flex flex-col gap-3 shadow-sm hover:shadow-md transition-shadow group">
                        <!-- Top Accent Line -->
                        <div class="absolute top-0 left-0 right-0 h-1.5 w-full" :style="`background-color: ${activity.color}`"></div>
                        
                        <div class="flex flex-col gap-1 pr-12 mt-1">
                            <span x-show="activity.group_name" x-text="activity.group_name"
                                class="w-fit mb-1 px-2.5 py-1 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md text-[10px] font-bold tracking-wider text-slate-500 uppercase"></span>
                            <div class="text-[15px] font-bold text-slate-800 dark:text-slate-100 leading-snug" x-text="activity.title"></div>
                            
                            <!-- Status Badge Positioned Top Right -->
                            <div class="absolute top-5 right-5">
                                <span class="px-2.5 py-1 rounded-md text-[10px] font-bold tracking-wider uppercase shadow-sm border"
                                    :class="activity.status === 'open' ? 'bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-900/30 dark:border-emerald-800' : 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:border-slate-700'">
                                    <span x-text="activity.status === 'open' ? 'เปิด' : 'ปิด'"></span>
                                </span>
                            </div>
                        </div>

                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-1 line-clamp-2 leading-relaxed" x-text="activity.description || 'ไม่มีคำอธิบาย'"></div>
                        
                        <div class="mt-2 flex flex-wrap gap-1.5">
                            <template x-if="activity.allowed_classrooms && activity.allowed_classrooms.length > 0 && activity.allowed_classrooms[0] !== ''">
                                <span class="text-[10px] bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-100 dark:border-indigo-800 px-2 py-1 rounded-md text-indigo-600 dark:text-indigo-400 font-medium"
                                    x-text="'ฉพาะห้อง: ' + activity.allowed_classrooms"></span>
                            </template>
                            <template x-if="activity.start_time">
                                <span class="text-[10px] bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-100 dark:border-emerald-800 px-2 py-1 rounded-md text-emerald-600 dark:text-emerald-400 font-medium"
                                    x-text="'เปิด: ' + new Date(activity.start_time).toLocaleString('th-TH')"></span>
                            </template>
                            <template x-if="activity.end_time">
                                <span class="text-[10px] bg-rose-50 dark:bg-rose-900/30 border border-rose-100 dark:border-rose-800 px-2 py-1 rounded-md text-rose-600 dark:text-rose-400 font-medium"
                                    x-text="'ปิด: ' + new Date(activity.end_time).toLocaleString('th-TH')"></span>
                            </template>
                        </div>
                        
                        <div class="mt-2 pb-3 border-b border-slate-100 dark:border-slate-800 text-xs font-medium text-slate-600 dark:text-slate-400 flex items-center justify-between">
                            <span>ผู้สมัคร: <span class="font-bold text-slate-800 dark:text-slate-200" x-text="activity.registered_count"></span> / <span x-text="activity.max_people"></span></span>
                            <span class="text-xs font-bold" :class="activity.remaining_seats > 0 ? 'text-emerald-500' : 'text-rose-500'" x-text="'เหลือ ' + activity.remaining_seats + ' ที่'"></span>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 mt-auto pt-1 text-xs font-semibold">
                            <button
                                class="px-3 py-2 rounded-xl transition shadow-sm border flex items-center justify-center text-center"
                                :class="activity.status === 'open' ? 'border-amber-200 text-amber-700 bg-amber-50 hover:bg-amber-100 dark:bg-amber-900/20 dark:border-amber-900/50' : 'border-emerald-200 text-emerald-700 bg-emerald-50 hover:bg-emerald-100 dark:bg-emerald-900/20 dark:border-emerald-900/50'"
                                @click="toggle(activity)">
                                <span x-text="activity.status === 'open' ? 'ปิดรับด่วน' : 'กลับมาเปิด'"></span>
                            </button>
                            <button
                                class="px-3 py-2 rounded-xl border border-rose-200 text-rose-600 hover:bg-rose-50 dark:border-rose-900/50 dark:hover:bg-rose-900/20 transition shadow-sm flex items-center justify-center text-center"
                                @click="remove(activity)">
                                ลบ
                            </button>
                            <a class="px-3 py-2 rounded-xl bg-slate-800 dark:bg-slate-700 text-white hover:bg-slate-900 dark:hover:bg-slate-600 transition shadow-md text-center flex items-center justify-center"
                                :href="`/admin/activity/${activity.id}`">
                                จัดการ
                            </a>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</section>
{% endblock %}
