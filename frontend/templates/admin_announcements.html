{% extends "base.html" %}
{% block title %}จัดการประกาศ (Announcements) - DSNPRU_REG{% endblock %}
{% block head_extra %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('announcementsPage', () => ({
            announcements: [],
            showCreateModal: false,
            showEditModal: false,
            form: { id: null, message: '', is_active: true, is_urgent: false, color: 'indigo' },
            colors: [
                { value: 'rose', label: 'แดง (Rose)' },
                { value: 'indigo', label: 'น้ำเงิน (Indigo)' },
                { value: 'emerald', label: 'เขียว (Emerald)' },
                { value: 'amber', label: 'เหลือง (Amber)' }
            ],

            async load() {
                const token = sessionStorage.getItem('adminToken');
                if (!token) { window.location.href = '/admin/login'; return; }
                try {
                    const res = await axios.get('/admin/api/announcements', {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    this.announcements = res.data;
                } catch (e) {
                    console.error(e);
                    if (e.response && e.response.status === 401) {
                        window.location.href = '/admin/login';
                    }
                }
            },
            openCreate() {
                this.form = { id: null, message: '', is_active: true, is_urgent: false, color: 'indigo' };
                this.showCreateModal = true;
            },
            openEdit(ann) {
                this.form = { ...ann };
                this.showEditModal = true;
            },
            closeModal() {
                this.showCreateModal = false;
                this.showEditModal = false;
            },
            async save() {
                if (!this.form.message) {
                    Swal.fire('กรุณากรอกข้อมูล', 'โปรดระบุข้อความประกาศ', 'warning');
                    return;
                }
                const token = sessionStorage.getItem('adminToken');
                const p = { ...this.form };
                delete p.id;

                try {
                    if (this.showCreateModal) {
                        await axios.post('/admin/api/announcements', p, {
                            headers: { Authorization: 'Bearer ' + token }
                        });
                        Swal.fire('สำเร็จ', 'เพิ่มประกาศเรียบร้อย', 'success');
                    } else {
                        await axios.put(`/admin/api/announcements/${this.form.id}`, p, {
                            headers: { Authorization: 'Bearer ' + token }
                        });
                        Swal.fire('สำเร็จ', 'อัปเดตประกาศเรียบร้อย', 'success');
                    }
                    this.closeModal();
                    this.load();
                } catch (e) {
                    Swal.fire('ผิดพลาด', e.response?.data?.detail || 'ไม่สามารถบันทึกได้', 'error');
                }
            },
            async deleteAnn(id) {
                const { isConfirmed } = await Swal.fire({
                    title: 'ยืนยันการลบ?',
                    text: 'คุณต้องการลบประกาศนี้ใช่หรือไม่',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#D95D39',
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });
                if (!isConfirmed) return;

                const token = sessionStorage.getItem('adminToken');
                try {
                    await axios.delete(`/admin/api/announcements/${id}`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    Swal.fire('สำเร็จ', 'ลบประกาศเรียบร้อย', 'success');
                    this.load();
                } catch (e) {
                    Swal.fire('ผิดพลาด', e.response?.data?.detail || 'ไม่สามารถลบได้', 'error');
                }
            }
        }));
    });
</script>
{% endblock %}
{% block content %}
<section x-data="announcementsPage()" x-init="load()" x-cloak>
    <header class="mb-lg" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
        <div>
            <h1 style="margin: 0;">จัดการประกาศ</h1>
            <p class="text-muted" style="margin-top: var(--space-xs); font-size: 0.75rem;">จัดการข้อความแจ้งเตือนป้ายแบนเนอร์ด้านบน</p>
        </div>
        <div style="display: flex; gap: var(--space-sm); align-items: center;">
            <button @click="openCreate()" class="btn btn--primary" style="font-size: 0.75rem; display: flex; align-items: center; gap: var(--space-xs);">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" style="color: white;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                เพิ่มประกาศใหม่
            </button>
            <a href="/admin/dashboard" class="btn btn--outline" style="font-size: 0.75rem;">กลับ</a>
        </div>
    </header>

    <!-- Table -->
    <div class="card" style="padding: 0; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 0.875rem;">
            <thead>
                <tr style="border-bottom: 2px solid var(--color-border); background: var(--color-background);">
                    <th style="padding: var(--space-sm) var(--space-md); text-align: left; width: 50%;" class="text-muted">ข้อความ</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: left;" class="text-muted">สถานะ</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: center;" class="text-muted">สี</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: right;" class="text-muted">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="ann in announcements" :key="ann.id">
                    <tr style="border-bottom: 1px solid var(--color-border);">
                        <td style="padding: var(--space-sm) var(--space-md);">
                            <div style="font-weight: 700; margin-bottom: 4px;">
                                <span x-show="ann.is_urgent" class="badge badge--danger border-none" style="margin-right: 4px; padding: 2px 6px; font-size: 0.65rem;">ด่วน</span>
                                <span x-text="ann.message"></span>
                            </div>
                            <div class="text-muted" style="font-size: 0.65rem;" x-text="new Date(ann.timestamp).toLocaleString('th-TH')"></div>
                        </td>
                        <td style="padding: var(--space-sm) var(--space-md);">
                            <span class="badge" :class="ann.is_active ? 'badge--success border-none' : ''">
                                <span x-text="ann.is_active ? 'เปิดใช้งาน' : 'ซ่อน'"></span>
                            </span>
                        </td>
                        <td style="padding: var(--space-sm) var(--space-md); text-align: center;">
                            <div style="width: 16px; height: 16px; border-radius: 50%; display: inline-block;"
                                :style="{
                                    'background-color': ann.color === 'rose' ? '#e11d48' : 
                                                        ann.color === 'indigo' ? '#4f46e5' : 
                                                        ann.color === 'emerald' ? '#10b981' : '#f59e0b'
                                }">
                            </div>
                        </td>
                        <td style="padding: var(--space-sm) var(--space-md); text-align: right;">
                            <button @click="openEdit(ann)" class="btn" style="background: transparent; border: none; padding: 4px; box-shadow: none;" title="แก้ไข">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" style="color: var(--color-primary);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                </svg>
                            </button>
                            <button @click="deleteAnn(ann.id)" class="btn" style="background: transparent; border: none; padding: 4px; box-shadow: none;" title="ลบ">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" style="color: var(--color-danger);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    </tr>
                </template>
                <tr x-show="announcements.length === 0">
                    <td colspan="4" style="padding: var(--space-xl); text-align: center;" class="text-muted">
                        ไม่พบประกาศ
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal Form -->
    <template x-teleport="body">
        <div x-show="showCreateModal || showEditModal" class="modal-overlay" style="display: none;" x-cloak>
            <div class="modal-content" @click.away="closeModal()">
                <div style="display: flex; gap: var(--space-sm); align-items: center; margin-bottom: var(--space-lg);">
                    <div class="badge badge--info border-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon-md" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" />
                        </svg>
                    </div>
                    <div>
                        <h3 style="margin: 0;" x-text="showCreateModal ? 'เพิ่มประกาศใหม่' : 'แก้ไขประกาศ'"></h3>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label text-muted">ข้อความประกาศ</label>
                    <textarea x-model="form.message" class="form-input" style="min-height: 80px;"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label text-muted">สีแบนเนอร์</label>
                    <select x-model="form.color" class="form-input">
                        <template x-for="c in colors">
                            <option :value="c.value" x-text="c.label"></option>
                        </template>
                    </select>
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; gap: var(--space-sm);">
                    <input type="checkbox" x-model="form.is_active" style="cursor: pointer;">
                    <span style="font-size: 0.875rem; font-weight: 700;">เปิดใช้งานทันที (แสดงบนหน้าเว็บ)</span>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: var(--space-sm);">
                    <input type="checkbox" x-model="form.is_urgent" style="cursor: pointer;">
                    <span style="font-size: 0.875rem; font-weight: 700; color: var(--color-danger);">ประกาศด่วน (แสดงเป็น Popup ให้ผู้ใช้กดยืนยัน)</span>
                </div>

                <div style="display: flex; gap: var(--space-md); margin-top: var(--space-xl);">
                    <button type="button" @click="closeModal()" class="btn btn--outline" style="flex: 1;">ยกเลิก</button>
                    <button type="button" @click="save()" class="btn btn--accent" style="flex: 1;">บันทึก</button>
                </div>
            </div>
        </div>
    </template>
</section>
{% endblock %}
