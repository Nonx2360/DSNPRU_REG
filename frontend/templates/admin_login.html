{% extends "base.html" %} 
{% block title %}Admin_Login - DSNPRU{% endblock %} 
{% block content %}
<section x-data="adminLoginPage()" class="login-layout">
    <div class="login-card">
        <div class="login-card__logo">
            <img src="/static/img/logo.png" alt="DSNPRU REGISTRATION Logo">
        </div>

        <h1 class="login-card__title">เข้าสู่ระบบ Admin</h1>

        <div class="form-group">
            <label class="form-label">ชื่อผู้ใช้</label>
            <input type="text" x-model="username" class="form-input" placeholder="admin">
        </div>
        
        <div class="form-group mb-xl">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" x-model="password" class="form-input" placeholder="••••••••" @keyup.enter="login">
        </div>

        <button type="button" @click="login" class="btn btn--primary btn--full" style="padding: var(--space-md);">
            LOG IN
        </button>
    </div>
</section>
{% endblock %}
