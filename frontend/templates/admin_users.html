{% extends "base.html" %}

{% block content %}
<section>
    <header class="mb-lg" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
        <div>
            <h1 style="margin: 0;">จัดการผู้ดูแลระบบ</h1>
            <p class="text-muted" style="margin-top: var(--space-xs); font-size: 0.75rem;">เพิ่ม ลบ หรือแก้ไขสิทธิ์การเข้าถึงระบบ</p>
        </div>
        <div style="display: flex; gap: var(--space-sm);">
            <button onclick="openCreateModal()" class="btn btn--primary" style="font-size: 0.75rem; display: flex; align-items: center; gap: var(--space-xs);">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" style="color: white;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                เพิ่มผู้ใช้ใหม่
            </button>
            <a href="/admin/dashboard" class="btn btn--outline" style="font-size: 0.75rem;">กลับแดชบอร์ด</a>
        </div>
    </header>

    <div class="card" style="padding: 0; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 0.875rem;">
            <thead>
                <tr style="border-bottom: 2px solid var(--color-border); background: var(--color-background);">
                    <th style="padding: var(--space-sm) var(--space-md); text-align: left;" class="text-muted">ID</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: left;" class="text-muted">ชื่อผู้ใช้ (Username)</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: center;" class="text-muted">บทบาท (Role)</th>
                    <th style="padding: var(--space-sm) var(--space-md); text-align: right;" class="text-muted">จัดการ</th>
                </tr>
            </thead>
            <tbody id="users-table-body" style="font-size: 0.875rem;">
                <!-- Users will be populated here -->
            </tbody>
        </table>
    </div>
</section>

<!-- Create User Modal -->
<div id="create-modal" class="modal-overlay" style="display: none;" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="modal-content">
        <div style="display: flex; gap: var(--space-sm); align-items: center; margin-bottom: var(--space-lg);">
            <div class="badge badge--success border-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon-md" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
            </div>
            <div>
                <h3 style="margin: 0;" id="modal-title">เพิ่มผู้ควบคุมระบบ</h3>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label text-muted">ชื่อผู้ใช้ (Username)</label>
            <input type="text" id="new-username" autocomplete="off" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label text-muted">รหัสผ่าน (Password)</label>
            <input type="password" id="new-password" class="form-input">
        </div>
        <div class="form-group">
            <label class="form-label text-muted">ระดับสิทธิ์ (Role)</label>
            <select id="new-role" class="form-input">
                <option value="staff">พนักงาน (Staff)</option>
                <option value="admin">ผู้ดูแลระบบ (Admin)</option>
            </select>
        </div>

        <div style="display: flex; gap: var(--space-md); margin-top: var(--space-xl);">
            <button type="button" onclick="closeCreateModal()" class="btn btn--outline" style="flex: 1;">ยกเลิก</button>
            <button type="button" onclick="createUser()" class="btn btn--accent" style="flex: 1;">สร้างบัญชี</button>
        </div>
    </div>
</div>

<script>
    const token = sessionStorage.getItem('adminToken');

    async function fetchUsers() {
        if (!token) {
            window.location.href = '/admin/login';
            return;
        }

        try {
            const response = await fetch('/admin/api/admins', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const users = await response.json();
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid var(--color-border)';
                    tr.innerHTML = `
                    <td style="padding: var(--space-sm) var(--space-md); font-family: monospace;" class="text-muted">${user.id}</td>
                    <td style="padding: var(--space-sm) var(--space-md); font-weight: 700;">${user.username}</td>
                    <td style="padding: var(--space-sm) var(--space-md); text-align: center;">
                        <span class="badge ${user.is_superuser ? 'badge--success border-none' : 'badge--info border-none'}">
                            ${user.is_superuser ? 'Admin' : 'Staff'}
                        </span>
                    </td>
                    <td style="padding: var(--space-sm) var(--space-md); text-align: right;">
                        <button onclick="deleteUser(${user.id})" class="btn" style="background: transparent; border: none; padding: 4px; box-shadow: none;" title="ลบผู้ใช้">
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" style="color: var(--color-danger);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                    tbody.appendChild(tr);
                });
            } else {
                const error = await response.json();
                if (response.status === 401 || response.status === 403) {
                    Swal.fire('ปฏิเสธการเข้าถึง', error.detail || 'คุณไม่มีสิทธิ์เข้าถึงหน้านี้', 'error').then(() => {
                        window.location.href = '/admin/dashboard';
                    });
                } else {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถดึงข้อมูล: ' + (error.detail || response.statusText), 'error');
                }
            }
        } catch (e) {
            console.error(e);
            Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
        }
    }

    function openCreateModal() {
        document.getElementById('create-modal').style.display = 'flex';
    }

    function closeCreateModal() {
        document.getElementById('create-modal').style.display = 'none';
    }

    async function createUser() {
        const username = document.getElementById('new-username').value;
        const password = document.getElementById('new-password').value;
        const role = document.getElementById('new-role').value;

        if (!username || !password) {
            Swal.fire('กรุณากรอกข้อมูล', 'โปรดระบุชื่อผู้ใช้และรหัสผ่าน', 'warning');
            return;
        }

        try {
            const response = await fetch('/admin/api/admins', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    is_superuser: role === 'admin'
                })
            });

            if (response.ok) {
                Swal.fire('สำเร็จ', 'สร้างผู้ใช้งานสำเร็จแล้ว', 'success');
                closeCreateModal();
                fetchUsers();
                document.getElementById('new-username').value = '';
                document.getElementById('new-password').value = '';
            } else {
                const error = await response.json();
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถสร้างผู้ใช้ได้: ' + (error.detail || response.statusText), 'error');
            }
        } catch (e) {
            console.error(e);
            Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
        }
    }

    async function deleteUser(id) {
        const result = await Swal.fire({
            title: 'ยืนยันการลบผู้ใช้?',
            text: "บัญชีนี้จะไม่สามารถเข้าสู่ระบบได้อีก",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e11d48',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'ยืนยันการลบ',
            cancelButtonText: 'ยกเลิก'
        });

        if (!result.isConfirmed) return;

        try {
            const response = await fetch(`/admin/api/admins/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                Swal.fire('ลบสำเร็จ!', 'ผู้ใช้งานถูกลบออกจากระบบแล้ว.', 'success');
                fetchUsers();
            } else {
                const error = await response.json();
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถลบผู้ใช้ได้: ' + (error.detail || response.statusText), 'error');
            }
        } catch (e) {
            console.error(e);
            Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
        }
    }

    fetchUsers();
</script>
{% endblock %}
